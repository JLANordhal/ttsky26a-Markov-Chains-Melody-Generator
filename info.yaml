# Tiny Tapeout project information
project:
  title:        "Melody Generator based on Markov Chains"     
  author:       "Arellano Nordahl Jose Luis"      
  discord:      "Wucho_N"      
  description:  "The design generates coherent melodies, using two Markov Chains, one that selects the duration and another for the notes on the Do Major Pentatonic Scale (Mute, Do, Re, Mi, Sol, La)
                The module is built by three main modules one LFSR that generates a pseudorandom 16-bit number, the MSB is for the duration Markov chain, and the LSB for the notes chain. The user:
                can select bits 0, 1, 2, and 3 of the seed, so there are up to 16 different melodies. The next module is the Markov chains; in this module, the logic is managed, and lastly, there is the:
                PWM generator module that receives the desired note from the second module and generates the PWM signal at the desired frequency with a 50% DC. With another input, the user can select: 
                between two different probability transition matrices for the duration Markov Chain. One is biased towards short-duration notes, the other towards long-duration notes. And finally, with:
                another input, 60 or 120 BPM can be chosen.:"
  language:     "Verilog"
  clock_hz:     1000000       

  tiles: "1x1"          

  
  top_module:  "tt_um_Melody_Generator_JLANordhal"


  source_files:
    - "project.v"


pinout:
  # Inputs
  ui[0]: "SEED[0]"           -- Bit 0 for the seed of the lfsr.
  ui[1]: "SEED[1]"           -- Bit 1 for the seed of the lfsr.
  ui[2]: "SEED[2]"           -- Bit 2 for the seed of the lfsr.
  ui[3]: "SEED[3]"           -- Bit 3 for the seed of the lfsr.
  ui[4]: "BPM_SEL"           -- 0 -> 120 BP;, 1 -> 60 BPM 
  ui[5]: "DUR_MATRIX_SEL"    -- 0 -> Matrix A1 (shorter notes), 1 -> Matrix A1 (longer notes).
  ui[6]: ""                  -- NOT USE
  ui[7]: ""

  # Outputs
  uo[0]: "PWM_SIG"           -- PWM Signal output  
  uo[1]: ""                  -- NOT USE
  uo[2]: ""                  -- NOT USE
  uo[3]: ""                  -- NOT USE
  uo[4]: ""                  -- NOT USE
  uo[5]: ""                  -- NOT USE
  uo[6]: ""                  -- NOT USE
  uo[7]: ""                  -- NOT USE

  # Bidirectional pins
  uio[0]: ""                 -- NOT USE
  uio[1]: ""                 -- NOT USE
  uio[2]: ""                 -- NOT USE
  uio[3]: ""                 -- NOT USE
  uio[4]: ""                 -- NOT USE
  uio[5]: ""                 -- NOT USE
  uio[6]: ""                 -- NOT USE
  uio[7]: ""                 -- NOT USE

# Do not change!
yaml_version: 6
